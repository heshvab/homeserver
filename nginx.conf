# -- Nextcloud --

server {
    listen 80;
    server_name nextcloud.shvab.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nextcloud.shvab.xyz;

    ssl_certificate     /etc/letsencrypt/live/nextcloud.shvab.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud.shvab.xyz/privkey.pem;

    client_max_body_size 20G;
    fastcgi_read_timeout 3600s;
    client_body_buffer_size 5M;
    client_body_temp_path /cache 1 2;

    location / {
        proxy_pass http://nextcloud-server:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

	proxy_read_timeout 3600s;
	proxy_connect_timeout 3600s;
	proxy_send_timeout 3600s;
    
	proxy_request_buffering off;
	proxy_buffering off;
    }
}
